<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="color-scheme" content="light dark">
  <script>
    (function () {
      var savedTheme = localStorage.getItem('theme');
      if (savedTheme) document.documentElement.dataset.theme = savedTheme;
    })();
  </script>
  <link rel="stylesheet" href="{{ '/stylesheets/stylesheet.css' | relative_url }}">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
</head>
<body>
  <a class="skip-link" href="#main-content">跳到正文</a>

  <header class="site-header">
    <div class="site-shell header-inner">
      <a class="site-brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }}首页">
        {{ site.title }}
        <span class="brand-mark" aria-hidden="true"></span>
      </a>

      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
        <span class="sr-only">打开导航</span>
        <span></span><span></span>
      </button>

      <nav class="site-nav" id="site-nav" aria-label="主导航">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>文章</a>
        <a href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}aria-current="page"{% endif %}>关于</a>
        <a href="{{ site.github_url }}" target="_blank" rel="noopener noreferrer">GitHub <span aria-hidden="true">↗</span></a>
        <button class="theme-toggle" type="button" aria-label="切换深色模式" title="切换深色模式">
          <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41"/></svg>
          <svg class="moon-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 14.2A8.5 8.5 0 0 1 9.8 3.5 8.5 8.5 0 1 0 20.5 14.2Z"/></svg>
        </button>
      </nav>
    </div>
  </header>

  <main id="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="site-shell footer-inner">
      <p>© <span data-current-year>2026</span> {{ site.author }}. 保持好奇，持续创造。</p>
      <div class="footer-links">
        <a href="{{ site.github_url }}" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a href="#main-content">返回顶部 ↑</a>
      </div>
    </div>
  </footer>
  <script src="{{ '/javascripts/main.js' | relative_url }}" defer></script>
</body>
</html>
